<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Création de compte<br> Acheteur e-MiniShopRDC<br>"e-Buyer"</title>
  <style>
    body {
      background: linear-gradient(to right, #ffdde1,#c8b6ff);
      font-family: 'Times New Roman', Times, serif, sans-serif;
      margin: 0;
      padding:0;
      
    }

    form {
      background: linear-gradient(to right,#c8b6ff ,#ffffff);
      padding: 100px;
      border-radius: 80px;
      max-width: 450px;
      margin: auto;
      box-shadow: 0 0 10px rgba(00,0,0,100);
    }

    label {
      font-weight: bold;
    }

    input[type="text"],
    input[type="tel"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border: 1px solid #ffdde1;
      border-radius: 40px;
    }

    button {
      background-color: blue;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
    }

    button:hover {
      background-color: blueviolet;
    }
  </style>
</head>
<body>
  <h1 style="text-align:center;">Création de compte<br> Acheteur e-MiniShopRDC<br>e-Buyer</h1>

  <form>
    <label for="nom_user">Nom :</label>
    <input type="text" id="nom_user" name="nom_user" required>
    <label for="tel">Numéro de téléphone :</label>
    <input type="tel" id="tel" name="tel" required>
    <label for="motdepassecon">Mot de passe de connexion :</label>
    <input type="password" id="motdepassecon" name="motdepassecon" required>
    <label for="motdepassecon"> Confirmer mot de passe :</label>
    <input type="password" id="motdepassecon" name="motdepassecon" required>

    <input type="checkbox" id="conditions" name="conditions" value="conditions" required>
    <label for="conditions">J'ai lu et accepter les <span>conditions d'usage</span> et je m'engage au respect de la politique et aux règles d'utilisisation</label><br>

  

    <button type="submit">Terminer mon inscription</button>

    
    <footer><small> &copy Tous droits réservés ChistoKlhBdzo & Megan Zener</small></footer>
  </form>
</body>
</html>

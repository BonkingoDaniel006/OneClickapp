<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inscription à e-MiniShopRDC</title>
  <style>
    body {
      background: linear-gradient(to right, #ffdde1,#c8b6ff);
      font-family: 'Times New Roman', Times, serif, sans-serif;
      margin: 0;
      padding:0;
      
    }

    form {
      background: linear-gradient(to right, #ffdde1,#c8b6ff);
      padding: 100px;
      border-radius: 80px;
      max-width: 450px;
      margin: auto;
      box-shadow: 0 0 10px rgba(00,0,0,100);
    }

    label {
      font-weight: bold;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border: 1px solid #ffdde1;
      border-radius: 40px;
    }

    button {
      background-color: blue;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
    }

    button:hover {
      background-color: blueviolet;
    }
  </style>
</head>
<body>
  <h1 style="text-align:center;">Inscription à <br>e-MiniShopRDC</h1>

  <form>
    <label for="nom">Nom :</label>
    <input type="text" id="nom" name="nom" required>
    <label for="prenom">Prenom :</label>
    <input type="text" id="Prenom" name="prenom" required>
    <label for="email">Email :</label>
    <input type="email" id="email" name="email" required>
    <label for="motdepasse">Mot de passe :</label>
    <input type="password" id="motdepasse" name="motdepasse" required>

    <p><strong>Type de compte :</strong></p>
    <input type="radio" id="vendeur" name="typedecompte" value="vendeur" required>
    <label for="vendeur">Vendeur</label>

    <input type="radio" id="acheteur" name="typedecompte" value="acheteur">
    <label for="acheteur">Acheteur</label><br><br>

    <button type="submit">S'inscrire</button>

    
    <footer><small> &copy Tous droits réservés ChistoKlhBdzo & Megan Zener</small></footer>
  </form>
</body>
</html>
